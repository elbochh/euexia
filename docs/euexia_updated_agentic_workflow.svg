  <path d="M143 532 C148 615, 138 684, 134 752" class="thin" stroke="#06b6d4" marker-end="url(#arrow-cyan)"/>

  <!-- Summary agent -->
  <rect x="540" y="218" width="205" height="316" rx="7" class="node" stroke="#06b6d4"/>
  <text x="642" y="250" text-anchor="middle" class="step">Step 2</text>
  <text x="642" y="289" text-anchor="middle" class="box-title" fill="#06b6d4">Summary Agent</text>
  <text x="642" y="320" text-anchor="middle" class="body">Gemma 4 on Vertex AI</text>
  <text x="642" y="366" text-anchor="middle" class="body">Merges upload summaries</text>
  <text x="642" y="385" text-anchor="middle" class="body">with mandatory medication</text>
  <text x="642" y="404" text-anchor="middle" class="body">list, then patches misses</text>
  <rect x="590" y="492" width="10" height="10" rx="2" fill="#8b5cf6"/>
  <text x="671" y="501" class="tiny" fill="#06b6d4">Gemma 4</text>

