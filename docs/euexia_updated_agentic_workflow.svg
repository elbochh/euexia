  <text x="920" y="366" text-anchor="middle" class="body">Structures meds, tests,</text>
  <text x="920" y="385" text-anchor="middle" class="body">appointments, monitoring,</text>
  <text x="920" y="404" text-anchor="middle" class="body">lifestyle into day events</text>
  <text x="920" y="448" text-anchor="middle" class="body">dedupe + validation</text>
  <text x="920" y="467" text-anchor="middle" class="body">before save</text>
  <circle cx="920" cy="495" r="18" fill="none" stroke="#111827" stroke-width="2"/>
  <path d="M907 495 C910 476, 932 477, 933 495 C930 515, 906 514, 907 495" fill="none" stroke="#111827" stroke-width="1.7"/>
  <path d="M745 374 L818 374" class="thin" stroke="#06b6d4" marker-end="url(#arrow-cyan)"/>

