  <text x="300" y="303" class="tiny">Speech-to-Text required in prod</text>

  <rect x="292" y="318" width="9" height="9" rx="2" fill="#8b5cf6"/>
  <text x="316" y="328" class="small-title" fill="#3b82f6">Text Agent</text>
  <text x="306" y="362" class="tiny">Gemma 4 text extraction</text>

  <rect x="292" y="394" width="9" height="9" rx="2" fill="#8b5cf6"/>
  <text x="316" y="404" class="small-title" fill="#10b981">Image Agent</text>
  <text x="302" y="438" class="tiny">Gemma 4 vision extraction</text>

  <rect x="292" y="470" width="9" height="9" rx="2" fill="#8b5cf6"/>
  <text x="316" y="480" class="small-title" fill="#f59e0b">PDF Agent</text>
