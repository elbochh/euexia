  <rect x="80" y="314" width="128" height="66" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="144" y="352" text-anchor="middle" class="box-title" fill="#3b82f6">Text</text>

