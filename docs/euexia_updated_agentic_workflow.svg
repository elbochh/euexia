  <text x="1140" y="117" text-anchor="middle" class="tiny" font-weight="700" fill="#0e7490">Vertex AI MaaS</text>
  <text x="1140" y="134" text-anchor="middle" class="tiny">usage based, no GPU endpoint</text>
