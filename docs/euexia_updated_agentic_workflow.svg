  <text x="521" y="687" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="23" fill="#8b5cf6">Step 6 -- Dr. Gemma Chat (RAG Pipeline)</text>

  <rect x="158" y="720" width="180" height="124" rx="6" fill="#f5f8ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="248" y="750" text-anchor="middle" class="small-title" fill="#3b82f6">Question</text>
  <text x="248" y="772" text-anchor="middle" class="small-title" fill="#3b82f6">Condenser</text>
  <text x="248" y="805" text-anchor="middle" class="tiny">Gemma 4 + recent chat</text>
  <text x="248" y="825" text-anchor="middle" class="tiny">standalone question</text>
  <rect x="208" y="827" width="9" height="9" rx="2" fill="#8b5cf6"/>

  <rect x="404" y="720" width="234" height="124" rx="6" fill="#f3fffb" stroke="#10b981" stroke-width="2"/>
  <text x="521" y="750" text-anchor="middle" class="small-title" fill="#10b981">Context Retriever</text>
  <text x="521" y="789" text-anchor="middle" class="tiny">Atlas Vector Search or</text>
  <text x="521" y="807" text-anchor="middle" class="tiny">cosine fallback + MMR</text>
  <text x="521" y="825" text-anchor="middle" class="tiny">active tasks + progress</text>

  <rect x="652" y="720" width="232" height="124" rx="6" fill="#f0fcff" stroke="#06b6d4" stroke-width="2"/>
