  <text x="768" y="789" text-anchor="middle" class="tiny">Gemma 4 answer</text>
  <text x="768" y="807" text-anchor="middle" class="tiny">post-process + dedupe</text>
  <text x="768" y="825" text-anchor="middle" class="tiny">save assistant response</text>
  <rect x="708" y="827" width="9" height="9" rx="2" fill="#8b5cf6"/>

  <path d="M338 782 L404 782" class="thin" stroke="#3b82f6" marker-end="url(#arrow-blue)"/>
  <path d="M638 782 L652 782" class="thin" stroke="#10b981" marker-end="url(#arrow-green)"/>
  <path d="M884 782 C1060 725, 1230 626, 1429 534" class="thin" stroke="#8b5cf6" marker-end="url(#arrow-purple)"/>
