  <text x="1182" y="484" text-anchor="middle" class="body">Maps + Game Progress</text>
  <text x="1182" y="502" text-anchor="middle" class="body">Context Chunks</text>
  <text x="1182" y="520" text-anchor="middle" class="body">Chat History</text>
  <path d="M1023 374 L1096 374" class="thin" stroke="#f43f5e" marker-end="url(#arrow-pink)"/>

  <!-- Patient experience -->
  <rect x="1342" y="218" width="174" height="316" rx="7" class="node" stroke="#06b6d4"/>
  <text x="1429" y="260" text-anchor="middle" class="box-title" fill="#06b6d4">Patient</text>
  <text x="1429" y="292" text-anchor="middle" class="box-title" fill="#06b6d4">Experience</text>
  <text x="1429" y="334" text-anchor="middle" class="small-title" fill="#f59e0b">Recovery Map</text>
  <text x="1429" y="368" text-anchor="middle" class="small-title" fill="#f59e0b">Day Stars + Tasks</text>
  <text x="1429" y="402" text-anchor="middle" class="small-title" fill="#f43f5e">Checklist</text>
  <text x="1429" y="436" text-anchor="middle" class="small-title" fill="#10b981">XP, Coins, Levels</text>
  <text x="1429" y="470" text-anchor="middle" class="small-title" fill="#8b5cf6">Dr. Gemma Chat</text>
  <text x="1429" y="504" text-anchor="middle" class="small-title" fill="#06b6d4">Leaderboard + Profile</text>
  <path d="M1268 374 L1342 374" class="thin" stroke="#10b981" marker-end="url(#arrow-green)"/>

  <!-- Map generator -->
  <rect x="1004" y="614" width="266" height="260" rx="7" class="node" stroke="#f59e0b"/>
  <text x="1137" y="648" text-anchor="middle" class="step">Step 5</text>
  <text x="1137" y="685" text-anchor="middle" class="box-title" fill="#f59e0b">Map Generator</text>
  <text x="1137" y="718" text-anchor="middle" class="body">Algorithmic default</text>
  <text x="1137" y="738" text-anchor="middle" class="body">Gemma 4 optional AI map</text>
  <text x="1137" y="773" text-anchor="middle" class="body">One star per day/group</text>
  <text x="1137" y="792" text-anchor="middle" class="body">Pixi/Kenney hex map</text>
  <text x="1137" y="811" text-anchor="middle" class="body">Walking animation + sync</text>
