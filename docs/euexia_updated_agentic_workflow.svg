<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#06b6d4"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-pink" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#f43f5e"/>
    </marker>
    <linearGradient id="soft-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="58%" stop-color="#f8fdff"/>
      <stop offset="100%" stop-color="#eefbff"/>
    </linearGradient>
    <linearGradient id="euexia-blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1466c8"/>
      <stop offset="55%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#00a7a5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0b1f58" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 700 44px Arial, Helvetica, sans-serif; fill: #000; }
      .main-title { font: 700 34px Arial, Helvetica, sans-serif; fill: #1f2937; letter-spacing: 1px; }
      .subtitle { font: 500 19px Arial, Helvetica, sans-serif; fill: #75849a; }
      .step { font: 700 15px Arial, Helvetica, sans-serif; fill: #718096; }
      .box-title { font: 700 23px Arial, Helvetica, sans-serif; }
      .small-title { font: 700 16px Arial, Helvetica, sans-serif; }
      .body { font: 500 15px Arial, Helvetica, sans-serif; fill: #75849a; }
      .tiny { font: 500 12px Arial, Helvetica, sans-serif; fill: #8390a3; }
      .legend { font: 500 12px Arial, Helvetica, sans-serif; fill: #7c8798; }
      .patient-label { font: 700 18px Arial, Helvetica, sans-serif; fill: #69758a; }
      .node { fill: rgba(255,255,255,0.74); stroke-width: 2.5; filter: url(#shadow); }
      .thin { stroke-width: 2.2; fill: none; }
      .dash { stroke-dasharray: 7 7; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#soft-bg)"/>

  <text x="44" y="56" class="title">Post-Consultation Agentic Workflow</text>

  <text x="535" y="166" class="main-title">Euexia -- Current Agentic AI Workflow</text>
  <text x="545" y="191" class="subtitle">Multimodal upload to Gemma 4 care plan, quest map, checklist, and RAG chat</text>

  <!-- Model legend -->
  <rect x="1262" y="154" width="292" height="78" rx="6" fill="#f8fbff" stroke="#dce7f3" filter="url(#shadow)"/>
  <text x="1378" y="175" class="small-title" text-anchor="middle" fill="#344155">Model Legend</text>
  <rect x="1290" y="188" width="10" height="10" rx="2" fill="#8b5cf6"/>
  <text x="1320" y="197" class="legend">= Gemma 4 26B MaaS on Vertex AI</text>
  <circle cx="1295" cy="214" r="7" fill="none" stroke="#111827" stroke-width="2"/>
  <path d="M1289 214 C1290 206, 1302 206, 1301 214 C1300 222, 1288 222, 1289 214" fill="none" stroke="#111827" stroke-width="1.4"/>
  <text x="1320" y="218" class="legend">= deterministic rules / app code</text>

