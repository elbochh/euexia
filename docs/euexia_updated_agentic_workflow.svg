  <path d="M1182 614 C1176 578, 1178 552, 1182 534" class="thin" stroke="#10b981" marker-end="url(#arrow-green)"/>

  <!-- Small workflow notes -->
  <rect x="536" y="556" width="452" height="58" rx="6" fill="#f8fbff" stroke="#cbd5e1"/>
  <text x="762" y="575" text-anchor="middle" class="tiny" font-weight="700" fill="#334155">Safety and consistency updates</text>
  <text x="762" y="592" text-anchor="middle" class="tiny">same-day medication unlocks, duplicate-dose sync</text>
  <text x="762" y="607" text-anchor="middle" class="tiny">refreshed timing after each completion</text>

  <!-- Cloud callout -->
