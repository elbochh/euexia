version: 1
# Monorepo: set "Monorepo root directory" to "frontend" in Amplify Console.
# Build runs with CWD = frontend/, so no "cd frontend" needed.
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
    appRoot: frontend
